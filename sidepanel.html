<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Insights</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <span class="logo">DSA Insights</span>
      <div class="header-right">
        <span class="note-count" id="note-count">0 notes</span>
        <button class="hamburger-btn" id="hamburger-btn" title="Menu">
          <svg class="icon-hamburger" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="hamburger-menu" id="hamburger-menu">
          <div class="hamburger-header">
            <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
              <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Menu</span>
          </div>
          <button class="hamburger-item" id="menu-stats">
            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
              <rect x="1" y="8" width="3" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/>
              <rect x="6" y="5" width="3" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/>
              <rect x="11" y="2" width="3" height="13" rx="1" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            <span>Tag Statistics</span>
          </button>
          <button class="hamburger-item" id="menu-export">
            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
              <path d="M8 2v8M4 6l4-4 4 4M2 14h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Export</span>
          </button>
          <button class="hamburger-item" id="menu-import">
            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
              <path d="M8 10V2M4 6l4 4 4-4M2 14h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Import</span>
          </button>
          <input type="file" id="import-file" accept=".json" hidden />
          <div class="hamburger-divider"></div>
          <div class="hamburger-item size-item">
            <span>Font Size</span>
            <div class="size-options">
              <button class="size-btn" data-size="small">S</button>
              <button class="size-btn" data-size="medium">M</button>
              <button class="size-btn" data-size="large">L</button>
            </div>
          </div>
          <button class="hamburger-item theme-item" id="menu-theme">
            <svg class="icon-sun" viewBox="0 0 16 16" fill="none" width="14" height="14">
              <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/>
              <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M11.89 4.11l1.06-1.06M3.05 12.95l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 16 16" fill="none" width="14" height="14">
              <path d="M13.5 9.5A5.5 5.5 0 016.5 2.5a5.5 5.5 0 000 11 5.5 5.5 0 007-4z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="theme-label">Dark Mode</span>
          </button>
        </div>
      </div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input id="search" type="text" placeholder="Search notes…" autocomplete="off" />
      <button class="clear-search" id="clear-search" title="Clear search">×</button>
    </div>
  </header>

  <!-- Chat match banner -->
  <div class="chat-banner" id="chat-banner" style="display:none">
    <svg viewBox="0 0 14 14" fill="none" width="12" height="12">
      <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
      <path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <span id="chat-banner-text">3 notes match this chat</span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-icon-btn" id="filter-icon-btn" title="Filter by tag">
      <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
        <path d="M2 3h12l-5 5v4l-3 2V8L2 3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="filter-input-wrap" id="filter-input-wrap">
      <input id="filter-input" type="text" placeholder="Filter by tag…" autocomplete="off" />
      <button class="filter-clear" id="filter-clear" title="Clear filter">×</button>
      <div class="filter-dropdown" id="filter-dropdown"></div>
    </div>
    <span class="filter-active-tag" id="filter-active-tag"></span>
  </div>

  <!-- Notes list -->
  <div class="notes" id="notes"></div>

  <!-- Onboarding modal -->
  <div class="onboarding" id="onboarding">
    <div class="onboarding-content">
      <h2>Welcome to DSA Insights</h2>
      <p class="onboarding-sub">Select your role to get personalized tags</p>
      <div class="role-grid" id="role-grid"></div>
      <div class="onboarding-actions">
        <button class="onboard-skip" id="onboard-skip">Skip</button>
        <button class="onboard-confirm" id="onboard-confirm" disabled>Continue</button>
      </div>
    </div>
  </div>

  <!-- Add note panel -->
  <div class="add-panel">
    <div class="add-panel-inner">
      <textarea id="input-text" placeholder="Insight or rule to remember…" rows="2"></textarea>
      <textarea id="input-note" placeholder="Extra context (optional)…" rows="2"></textarea>

      <!-- Tag chips picker -->
      <div class="tag-picker" id="tag-picker"></div>

      <!-- New tag input -->
      <div class="new-tag-row">
        <input id="new-tag-input" type="text" placeholder="+ new tag…" maxlength="24" autocomplete="off" />
      </div>

      <button class="save-btn" id="save-btn">Save</button>
    </div>
  </div>

</div>

<script src="sidepanel.js"></script>
</body>
</html>
