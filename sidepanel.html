<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Insights</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <span class="logo">DSA Insights</span>
      <span class="note-count" id="note-count">0 notes</span>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input id="search" type="text" placeholder="Search notes…" autocomplete="off" />
      <button class="clear-search" id="clear-search" title="Clear search">×</button>
    </div>
  </header>

  <!-- Chat match banner -->
  <div class="chat-banner" id="chat-banner" style="display:none">
    <svg viewBox="0 0 14 14" fill="none" width="12" height="12">
      <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
      <path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <span id="chat-banner-text">3 notes match this chat</span>
  </div>

  <!-- Tag filters -->
  <div class="filters" id="filters"></div>

  <!-- Notes list -->
  <div class="notes" id="notes"></div>

  <!-- Add note panel -->
  <div class="add-panel">
    <div class="add-panel-inner">
      <textarea id="input-text" placeholder="Insight or rule to remember…" rows="2"></textarea>
      <textarea id="input-note" placeholder="Extra context (optional)…" rows="2"></textarea>
      <div class="add-row">
        <select id="input-tag">
          <option value="general">General</option>
          <option value="arrays">Arrays</option>
          <option value="strings">Strings</option>
          <option value="sliding-window">Sliding window</option>
          <option value="prefix-sum">Prefix sum</option>
          <option value="hashing">Hashing</option>
          <option value="trees">Trees</option>
          <option value="graphs">Graphs</option>
          <option value="dp">DP</option>
          <option value="sorting">Sorting</option>
          <option value="backtracking">Backtracking</option>
          <option value="binary-search">Binary search</option>
          <option value="heaps">Heaps</option>
          <option value="tries">Tries</option>
        </select>
        <button class="save-btn" id="save-btn">Save</button>
      </div>
    </div>
  </div>

</div>

<script src="sidepanel.js"></script>
</body>
</html>
